services:
  db:
    image: postgres:15-alpine
    container_name: capstone_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-2004}
      POSTGRES_DB: ${DB_DATABASE:-capstone_db}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: capstone_api
    restart: always
    depends_on:
      - db
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - DB_TYPE=postgres
      # We must use the service name 'db' here instead of 'localhost' 
      # because the app is running inside a Docker network
      - DB_HOST=db
      - DB_PORT=${DB_PORT:-5432}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-2004}
      - DB_DATABASE=${DB_DATABASE:-capstone_db}
      - DB_SYNCHRONIZE=${DB_SYNCHRONIZE:-false}
      - JWT_SECRET=${JWT_SECRET:-ksfhoisdfgingfioewiogfiofgiifofoiogejfjoifjdiosj}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-1d}

volumes:
  postgres_data:
